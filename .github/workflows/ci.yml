name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: npm install
      - run: bash apps/tdd/fixtures/add-kata/setup-venv.sh
      - run: bash apps/tdd/fixtures/strings-kata/setup-venv.sh
      - run: bash packages/core/fixtures/add-kata/setup-venv.sh
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
